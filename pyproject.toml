[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".venv",
  "venv",
  "migrations",
  "import_old",
  "snapshots",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]
ignore = ["E501"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q --strict-markers --strict-config --disable-warnings --maxfail=1"
testpaths = ["tests", "core"]
python_files = ["test_*.py", "*_test.py"]
DJANGO_SETTINGS_MODULE = "config.settings"

[tool.coverage.run]
branch = true
source = ["."]
omit = [
  "*/migrations/*",
  "*/tests/*",
  "manage.py",
  "config/asgi.py",
  "config/wsgi.py",
  "core/management/*",
]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 80

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
exclude = ["migrations", "venv", ".venv", "import_old"]

[[tool.mypy.overrides]]
module = ["core.services.student_parser"]
ignore_errors = true

[tool.django-stubs]
django_settings_module = "config.settings"
