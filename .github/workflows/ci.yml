name: ci

on:
  push:
  pull_request:

env:
  DJANGO_SETTINGS_MODULE: config.settings
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DJANGO_DEBUG: 'true'

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Mypy
        run: mypy .

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Clean shipped DB for fresh test database
        run: rm -f db.sqlite3
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Pytest + coverage
        run: |
          coverage run -m pytest
          coverage report --fail-under=35

  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Bandit
        env:
          PYTHONUTF8: '1'
        run: bandit -r core -s B404,B603,B607
      - name: Dependency audit
        run: pip-audit
