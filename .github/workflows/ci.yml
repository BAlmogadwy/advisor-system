name: ci

on:
  push:
  pull_request:

env:
  DJANGO_SETTINGS_MODULE: config.settings
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DJANGO_DEBUG: 'true'

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .

  typecheck:
    # Temporary policy: mypy is advisory while the existing backlog is reduced.
    # Current baseline on master (2026-04-20): 235 errors in 28 files.
    # Top 6 offenders account for ~220/235:
    #   core/timetable_workspace_views.py, core/services/timetable_solver.py,
    #   core/services/planner_builder.py, core/services/timetable_export.py,
    #   core/services/recommender_batch.py, core/report_views.py.
    # Do NOT add path exclusions here — the follow-up cleanup PR reduces
    # the backlog directly, starting with the top 6.
    name: typecheck (mypy, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Mypy (non-blocking — output is visible but does not fail CI)
        run: mypy .

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Clean shipped DB for fresh test database
        run: rm -f db.sqlite3
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Pytest + coverage
        run: |
          coverage run -m pytest
          coverage report --fail-under=35

  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Bandit
        env:
          PYTHONUTF8: '1'
        run: bandit -r core -s B101,B311,B404,B603,B607
      - name: Dependency audit
        # Temporary ignore for pytest GHSA-6w46-j5rx-g56g. Test-only
        # dependency; the fix requires pytest 9.x (major bump).
        # Upgrading to pytest 9.x is deferred to a dedicated
        # compatibility PR that will re-run the full 183-test suite
        # against the new major-release behaviour.
        run: pip-audit --ignore-vuln GHSA-6w46-j5rx-g56g
