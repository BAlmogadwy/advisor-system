  function activatePanel(target) {
    links.forEach(l => l.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    const link = Array.from(links).find((l) => l.dataset.target === target);
    if (link) {
      link.classList.add('active');
      const current = q('currentModule');
      if (current) current.textContent = link.textContent?.trim() || target;
    }
    /* Update page intro title + subtitle */
    const introTitle = q('pageIntroTitle');
    const introSub = q('pageIntroSub');
    if (introTitle && link) introTitle.textContent = link.textContent?.trim() || target;
    if (introSub && PANEL_SUBS[target]) introSub.textContent = PANEL_SUBS[target];
    const panel = document.getElementById(target);
    if (panel) {
      panel.classList.add('active');
      /* Auto-focus the primary input of the activated panel */
      const PANEL_FOCUS = {
        student:'studentIdInput', batch:'batchYear', prereq:'preProgram',
        scrape:'scrapeConcurrency', debug:'dbgYear', eligibility:'elCourse',
        advisoradmin:'advId', highpriority:'hpYear', planviewer:'planProgram'
      };
      requestAnimationFrame(() => {
        const focusId = PANEL_FOCUS[target];
        const focusEl = focusId ? document.getElementById(focusId) : null;
        if (focusEl) { focusEl.focus({ preventScroll: true }); return; }
        const heading = panel.querySelector('h2, h3, h4');
        if (heading) {
          if (!heading.hasAttribute('tabindex')) heading.setAttribute('tabindex', '-1');
          heading.focus({ preventScroll: true });
        }
      });

  /* ── Normalize prereq data: split comma-separated prerequisites ── */
  function normalizePrereqs(items) {
    const out = [];
    items.forEach(row => {
      const course = String(row.course_code).trim();
      String(row.prerequisite_course_code).split(',').map(s => s.trim()).filter(Boolean).forEach(p => {
        out.push({ course_code: course, prerequisite_course_code: p });
      });
    });
    return out;
  }

  /* ── Prereq graph renderer ── */
  function renderPrereqGraph(items, container) {
    const prereqs = {};
    const allCourses = new Set();
    items.forEach(row => {
      const c = row.course_code, p = row.prerequisite_course_code;
      allCourses.add(c); allCourses.add(p);
      if (!prereqs[c]) prereqs[c] = [];
      prereqs[c].push(p);
    });

    /* topological layers: 0 = foundation, higher = more dependent */
    const layers = {};
    function depth(c, vis) {
      if (layers[c] !== undefined) return layers[c];
      if (!vis) vis = new Set();
      if (vis.has(c)) return 0;
      vis.add(c);
      const ps = prereqs[c] || [];
      if (!ps.length) { layers[c] = 0; return 0; }
      const d = Math.max(...ps.map(p => depth(p, new Set(vis)))) + 1;
      layers[c] = d; return d;
    }
    allCourses.forEach(c => depth(c));

    /* group by layer */
    const groups = {};
    let maxL = 0;
    allCourses.forEach(c => {
      const l = layers[c] || 0;
      if (!groups[l]) groups[l] = [];
      groups[l].push(c);
      if (l > maxL) maxL = l;
    });
    Object.values(groups).forEach(a => a.sort());

    /* layout — measure longest label per node for dynamic width */
    const nH = 34, gX = 20, gY = 56;
    const maxRow = Math.max(...Object.values(groups).map(g => g.length));
    /* dynamic node width: measure chars of longest code */
    const maxChars = Math.max(...[...allCourses].map(c => c.length));
    const nW = Math.max(72, maxChars * 8 + 20);
    const svgW = Math.max(480, maxRow * (nW + gX) + gX * 2);
    const svgH = (maxL + 1) * (nH + gY) + gY;

    /* position nodes */
    const pos = {};
    for (let l = 0; l <= maxL; l++) {
      const g = groups[l] || [];
      const tw = g.length * nW + (g.length - 1) * gX;
      const sx = (svgW - tw) / 2;
      g.forEach((c, i) => {
        pos[c] = { x: sx + i * (nW + gX) + nW / 2, y: gY / 2 + l * (nH + gY) + nH / 2 };
      });
    }

    /* build SVG */
    let s = `<svg class="prereq-svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">`;
    s += `<defs><marker id="pgA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--teal)" opacity="0.5"/></marker>`;
    s += `<filter id="nSh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(17,17,68,0.07)"/></filter></defs>`;

    /* edges — bezier from prereq (bottom) → course (top) */
    items.forEach(row => {
      const f = pos[row.prerequisite_course_code], t = pos[row.course_code];
      if (!f || !t) return;
      const y1 = f.y + nH / 2, y2 = t.y - nH / 2, cy = (y1 + y2) / 2;
      s += `<path class="pg-edge" d="M${f.x},${y1} C${f.x},${cy} ${t.x},${cy} ${t.x},${y2}" data-f="${row.prerequisite_course_code}" data-t="${row.course_code}" marker-end="url(#pgA)"/>`;
    });

    /* nodes — color by role */
    const isPreOf = new Set();
    items.forEach(r => isPreOf.add(r.prerequisite_course_code));
    allCourses.forEach(c => {
      const p = pos[c]; if (!p) return;
      const hasP = (prereqs[c] || []).length > 0, isP = isPreOf.has(c);
      let fl = 'rgba(255,255,255,0.65)', st = 'rgba(17,17,68,0.08)', tc = 'var(--navy)';
      if (!hasP && isP) { fl = 'rgba(10,142,110,0.08)'; st = 'rgba(10,142,110,0.22)'; tc = '#087a5e'; }
      else if (hasP && !isP) { fl = 'rgba(64,86,227,0.08)'; st = 'rgba(64,86,227,0.22)'; tc = '#3548c9'; }
      s += `<g class="pg-node" data-c="${c}"><rect x="${p.x-nW/2}" y="${p.y-nH/2}" width="${nW}" height="${nH}" rx="8" fill="${fl}" stroke="${st}" stroke-width="1.2" filter="url(#nSh)"/><text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="${tc}" font-family="var(--font-mono)" font-size="11" font-weight="700">${c}</text></g>`;
    });
    s += '</svg>';

    /* legend */
    s += `<div class="pg-legend"><span><span class="pg-legend-dot" style="color:var(--teal);background:var(--teal)"></span>Foundation</span><span><span class="pg-legend-dot" style="color:var(--royal);background:var(--royal)"></span>Terminal</span><span><span class="pg-legend-dot" style="color:var(--navy);background:var(--navy)"></span>Intermediate</span><span style="margin-inline-start:auto;opacity:0.4;font-weight:400">Hover to trace chains</span></div>`;
    container.innerHTML = s;

    /* interactivity — hover highlights full chain */
    container.querySelectorAll('.pg-node').forEach(nd => {
      nd.addEventListener('mouseenter', () => {
        const cc = nd.dataset.c, conn = new Set();
        (function up(x) { conn.add(x); (prereqs[x]||[]).forEach(p => { if(!conn.has(p)) up(p); }); })(cc);
        (function dn(x) { conn.add(x); Object.entries(prereqs).forEach(([k,v]) => { if(v.includes(x) && !conn.has(k)) dn(k); }); })(cc);
        container.querySelectorAll('.pg-node').forEach(n => { n.classList.toggle('hl', conn.has(n.dataset.c)); n.classList.toggle('dm', !conn.has(n.dataset.c)); });
        container.querySelectorAll('.pg-edge').forEach(e => { const ok = conn.has(e.dataset.f) && conn.has(e.dataset.t); e.classList.toggle('hl', ok); e.classList.toggle('dm', !ok); });
      });
      nd.addEventListener('mouseleave', () => {
        container.querySelectorAll('.pg-node,.pg-edge').forEach(el => { el.classList.remove('hl','dm'); });
      });
    });
  }

  function detectNextSuggestedTerm(terms) {
    for (const t of terms) {
      const hasCanRegister = (t.courses || []).some((c) => c.status === 'not_taken' && c.can_register);
      if (hasCanRegister) return t.term;
    }
    return null;
  }

  function selectTargetPlanCourses(pool, targetCredits, strategy) {
    const candidates = pool
      .filter((c) => Number(c.credit_hours || 0) > 0)
      .slice(0, 18);

    let best = { usedCredits: 0, score: -1e9, picks: [] };

    function evalPicks(picks, usedCredits) {
      const totalImportance = picks.reduce((s, c) => s + Number(c.importance_score || 0), 0);
      const termCounts = {};
      picks.forEach((c) => {
        const t = String(c.programme_term ?? '0');
        termCounts[t] = (termCounts[t] || 0) + 1;
      });
      const concentrationPenalty = Object.values(termCounts).reduce((s, n) => s + Number(n) * Number(n), 0);
      const fitBonus = usedCredits / Math.max(targetCredits, 1);
      let score = totalImportance * 10 + fitBonus;
      if (strategy === 'balanced') score -= concentrationPenalty * 0.9;
      return score;
    }

    function dfs(i, picks, usedCredits) {
      const currentScore = evalPicks(picks, usedCredits);
      if (
        usedCredits > best.usedCredits ||
        (usedCredits === best.usedCredits && currentScore > best.score)
      ) {
        best = { usedCredits, score: currentScore, picks: picks.slice() };
      }
      if (i >= candidates.length) return;

      for (let j = i; j < candidates.length; j++) {
        const c = candidates[j];
        const ch = Number(c.credit_hours || 0);
        if (usedCredits + ch > targetCredits) continue;
        picks.push(c);
        dfs(j + 1, picks, usedCredits + ch);
        picks.pop();
      }
    }

    dfs(0, [], 0);
    return best;
  }

  function renderStudentPlanTerms() {
    const container = q('studentPlanTerms');
    const topImportant = q('studentPlanTopImportant');
    const actionPlan = q('studentPlanActionPlan');
    if (!container || !topImportant || !actionPlan || !studentPlanData) return;

    let terms = studentPlanData.terms || [];

      terms = terms.filter((t) => t.term === studentPlanFocusedTerm);

    const meta = q('studentPlanMeta');
    if (meta && studentPlanData) {
      const blockerNote = studentPlanBlockedBy ? ` • blocker filter: ${studentPlanBlockedBy}` : '';

    }

    const allCourses = terms.flatMap((t) => Array.isArray(t.courses) ? t.courses : []);
    const topImportantCourses = allCourses
      .slice()
      .sort((a, b) => Number(b.importance_score || 0) - Number(a.importance_score || 0))
      .slice(0, 5);
    topImportant.innerHTML = topImportantCourses.length
      ? `<div style="font-size:11px;font-weight:600;color:var(--t3);font-family:var(--font-mono);margin-bottom:6px;letter-spacing:0.04em">${T.topImportance}</div><div style="display:flex;flex-wrap:wrap;gap:6px">${topImportantCourses.map((c, i) => `<span class="pill-status ${i === 0 ? 'pill-g' : 'pill-b'}" style="font-family:var(--font-mono);font-size:11px"><span class="pill-dot"></span>${c.course_code} <span style="opacity:0.6">${Number(c.importance_score || 0).toFixed(1)}</span></span>`).join('')}</div>`
      : '';

    const targetCredits = Number(q('spTargetCredits')?.value || 18);
    const strategy = String(q('spTargetStrategy')?.value || 'max');
    const canRegisterPool = allCourses
      .filter((c) => c.status === 'not_taken' && c.can_register)
      .sort((a, b) => Number(b.importance_score || 0) - Number(a.importance_score || 0));

    const planResult = selectTargetPlanCourses(canRegisterPool, targetCredits, strategy);
    const selected = planResult.picks || [];
    const usedCredits = planResult.usedCredits || 0;

    actionPlan.innerHTML = selected.length
      ? `<div class="cpanel mb-0"><div class="cp-h"><span class="cp-t">${T.actionPlan}</span><span class="pill-status pill-g" style="font-size:10px"><span class="pill-dot"></span>${strategy === 'balanced' ? T.balanced : T.maxImp} • ${usedCredits}/${targetCredits} CH</span></div><div class="cp-b" style="padding:8px 12px">${selected.map((c, i) => `<div class="plan-item"><div><div class="title">${c.course_code}</div><div class="sub">Imp ${Number(c.importance_score || 0).toFixed(1)} • T${c.programme_term ?? '-'} • ${c.credit_hours ?? '-'} CH</div></div><span class="pill-status pill-g" style="font-size:10px"><span class="pill-dot"></span>#${i + 1}</span></div>`).join('')}</div></div>`
      : '';

    container.innerHTML = terms.map((termObj) => {
      let rows = Array.isArray(termObj.courses) ? termObj.courses : [];
      if (studentPlanFilterMode === 'can-only') {
        rows = rows.filter((c) => c.status === 'not_taken' && c.can_register);
      } else if (studentPlanFilterMode === 'locked-only') {
        rows = rows.filter((c) => c.status === 'not_taken' && !c.can_register);
      }
      if (studentPlanBlockedBy) {
        rows = rows.filter((c) => Array.isArray(c.missing_prereqs) && c.missing_prereqs.includes(studentPlanBlockedBy));
      }
      if (studentPlanSortMode === 'importance') {
        rows = rows.slice().sort((a, b) => Number(b.importance_score || 0) - Number(a.importance_score || 0));
      } else if (studentPlanSortMode === 'status') {
        const rank = { passed: 0, studying: 1, not_taken: 2 };
        rows = rows.slice().sort((a, b) => (rank[a.status] ?? 9) - (rank[b.status] ?? 9));
      } else if (studentPlanSortMode === 'code') {
        rows = rows.slice().sort((a, b) => String(a.course_code).localeCompare(String(b.course_code)));
      }

      const total = rows.length;
      const passedN = rows.filter((c) => c.status === 'passed').length;
      const studyingN = rows.filter((c) => c.status === 'studying').length;
      const canN = rows.filter((c) => c.status === 'not_taken' && c.can_register).length;
      const lockedN = rows.filter((c) => c.status === 'not_taken' && !c.can_register).length;

      const tbody = rows.length
        ? rows.map((c) => {
            let cls = '';
            if (c.status === 'passed') cls = 'status-passed';
            else if (c.status === 'studying') cls = 'status-studying';
            else if (c.status === 'not_taken' && c.can_register) cls = 'status-can-register';
            const prereqText = (c.prerequisites || []).join(', ') || '-';
            const missingText = (c.missing_prereqs || []).join(', ');
            const statusBadge = c.status === 'passed'
              ? `<span class="pill-status pill-g"><span class="pill-dot"></span>${T.passed}</span>`
              : c.status === 'studying'
              ? `<span class="pill-status pill-b"><span class="pill-dot"></span>${T.studying}</span>`
              : c.can_register
              ? `<span class="pill-status pill-g can-register-pill"><span class="pill-dot"></span>${T.canRegisterShort}</span>`
              : `<span class="pill-status pill-r"><span class="pill-dot"></span>${T.locked}</span>`;
            const importanceNum = Number(c.importance_score || 0);
            const importance = importanceNum.toFixed(2);
            const impClass = importanceNum >= 2 ? 'importance-high' : importanceNum >= 1 ? 'importance-mid' : 'importance-low';
            const prereqCell = missingText ? `${prereqText}<div class="missing-prereq mt-1">${T.missing}: ${missingText}</div>` : prereqText;
            const rowPayload = encodeURIComponent(JSON.stringify({
              course_code: c.course_code,
              credit_hours: c.credit_hours,
              programme_term: c.programme_term,
              status: c.status,
              can_register: c.can_register,
              prerequisites: c.prerequisites || [],
              missing_prereqs: c.missing_prereqs || [],
              importance_score: c.importance_score || 0,
            }));
            return `<tr class="cr-row ${cls} course-row" data-course-json="${rowPayload}"><td><span class="cr-id">${c.course_code}</span></td><td style="font-family:var(--font-mono);font-size:12px">${c.credit_hours ?? '-'}</td><td>${statusBadge}</td><td style="font-size:11px">${prereqCell}</td><td class="${impClass}">${importance}</td></tr>`;
          }).join('')
        : `<tr><td colspan="5" class="empty-note">${T.noCoursesThisTerm}</td></tr>`;

      const compactClass = studentPlanCompact ? 'table-compact' : '';
      return `<details class="term-details" ${studentPlanExpandAll ? 'open' : ''}><summary class="term-summary"><div class="term-header-sticky"><h4>${T.termSection(termObj.term)}</h4><div style="display:flex;gap:5px;margin-inline-start:auto">${passedN ? `<span class="pill-status pill-g" style="font-size:10px"><span class="pill-dot"></span>${passedN}</span>` : ''}${studyingN ? `<span class="pill-status pill-b" style="font-size:10px"><span class="pill-dot"></span>${studyingN}</span>` : ''}${canN ? `<span class="pill-status pill-g" style="font-size:10px;background:rgba(0,174,218,0.08);color:var(--sky);border-color:rgba(0,174,218,0.16)"><span class="pill-dot"></span>${canN}</span>` : ''}${lockedN ? `<span class="pill-status pill-r" style="font-size:10px"><span class="pill-dot"></span>${lockedN}</span>` : ''}</div></div></summary><div style="padding:0 12px 12px"><table class="tbl-card mb-0 ${compactClass}" style="border-spacing:0 4px"><thead><tr><th scope="col">${T.course}</th><th scope="col">${T.ch}</th><th scope="col">${T.status}</th><th scope="col">${T.prerequisites}</th><th scope="col">${T.imp}</th></tr></thead><tbody>${tbody}</tbody></table></div></details>`;
    }).join('');

    bindCourseRowClicks();
    renderCourseDrawer();
  }

    if (lockedCount >= 10) {
      riskChips.push(`<span class="alert-chip warn">${T.heavyLockAlert(lockedCount)}</span>`);

    const critical = hints.filter((h) => Number(h.blocks || 0) >= 3).slice(0, 3);

      el.addEventListener('click', () => {
        const blocker = el.getAttribute('data-blocker');

    q('loadStudentPlan').disabled = false;
    q('loadStudentPlan').innerHTML = `<span class="i i-sm" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>${T.loadPlanBtn}`;
  };

  async function refreshScrapeStatus() {
    let res, data;
    try {
      res = await fetch('/ops/scrape/status/');

    } catch (err) {
      console.error('[refreshScrapeStatus] Network error:', err);
      notify.error('Failed to refresh scrape status', err.message || String(err));
      return;
    }

    const hasFailureTrace = typeof data.log_tail === 'string' && data.log_tail.includes('Traceback');
    let statusHtml = '<span class="status-dot status-stopped"></span>' + T.idle;
    if (data.running) {
      statusHtml = '<span class="status-dot status-running"></span>' + T.scrapeRunning;
    } else if (data.last_action === 'failed' || hasFailureTrace) {
      statusHtml = '<span class="status-dot status-failed"></span>' + T.scrapeFailed;
    }

    q('scrapeMetricStatus').innerHTML = statusHtml;
    q('scrapeMetricPid').textContent = String(data.pid ?? '-');
    q('scrapeMetricStarted').textContent = String(data.started_at ?? '-');
    q('scrapeMetricStopped').textContent = String(data.stopped_at ?? '-');

    q('scrapeMeta').textContent = `action=${data.last_action ?? '-'} log=${data.log_path}`;
    q('scrapeUpdatedAt').textContent = `${T.lastUpdate}: ${new Date().toLocaleTimeString()}`;
    const logEl = q('scrapeOut');
    const rawLog = data.log_tail || '';
    if (!rawLog) {
      logEl.innerHTML = `<span style="color:#a0aec0">${T.noLogsYet}</span>`;
    } else {
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML = rawLog.split('\n').map(line => {
        const l = esc(line);
        /* colorize timestamps like [HH:MM:SS] or [YYYY-MM-DD HH:MM:SS] */
        let colored = l.replace(/^(\[[\d\-: ]+\])/, '<span class="t-ts">$1</span>');
        /* colorize success markers */
        colored = colored.replace(/(✓|OK|SUCCESS|DONE|completed)/gi, '<span class="t-ok">$1</span>');
        /* colorize error/fail markers */
        colored = colored.replace(/(✗|ERROR|FAIL|Traceback|Exception|timeout)/gi, '<span class="t-er">$1</span>');
        /* colorize warnings */
        colored = colored.replace(/(WARNING|WARN|retry|retrying)/gi, '<span class="t-wrn">$1</span>');
        /* highlight numbers like counts 423/764 */
        colored = colored.replace(/(\d+)\s*\/\s*(\d+)/g, '<span class="t-hl">$1</span>/$2');
        return '<div>' + colored + '</div>';
      }).join('');
    }
    if (data.running) {
      logEl.scrollTop = logEl.scrollHeight;
    }

    q('scrapeStart').disabled = Boolean(data.running);
    q('scrapeStop').disabled = !Boolean(data.running);

    const historyBody = document.querySelector('#scrapeHistoryTable tbody');
    if (historyBody) {
      const history = Array.isArray(data.history) ? data.history : [];
      const cntEl = document.getElementById('scrapeHistoryCnt');
      const pagerEl = document.getElementById('scrapeHistPager');
      if (history.length === 0) {
        historyBody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="i empty-icon-muted"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><div class="empty-title">${T.noScrapeHistory}</div><div class="empty-hint">${T.runScrapeHint}</div></div></td></tr>`;
        if (cntEl) cntEl.textContent = '0';
        if (pagerEl) pagerEl.classList.add('d-none');
      } else {
        const allRows = history.slice().reverse().map((h) => {
          const evt = h.event ?? '-';
          const evtPill = evt === 'started' ? 'pill-g' : evt === 'stopped' ? 'pill-a' : evt === 'failed' ? 'pill-r' : 'pill-b';
          const evtLabel = evt === 'started' ? T.started : evt === 'stopped' ? T.stopped : evt === 'failed' ? T.failed : evt;
          return `<tr class="cr-row"><td style="font-family:var(--font-mono);font-size:11px;color:var(--t3)">${h.at ?? '-'}</td><td><span class="pill ${evtPill}" style="font-size:11px;padding:3px 10px"><span class="pill-dot" style="width:6px;height:6px;border-radius:50%;display:inline-block;margin-inline-end:5px;background:currentColor;opacity:0.5"></span>${evtLabel}</span></td><td style="font-family:var(--font-mono)">${h.pid ?? '-'}</td><td>${h.concurrency ?? '-'}</td><td style="font-family:var(--font-mono);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.students_csv ?? '-'}</td></tr>`;
        });
        if (cntEl) cntEl.textContent = history.length;
        /* ── Paginate scrape history (5 rows per page) ── */
        const PER_PAGE = 5;
        const total = allRows.length;
        const pages = Math.ceil(total / PER_PAGE);
        let curPage = 1;
        const prevBtn = document.getElementById('shPrev');
        const nextBtn = document.getElementById('shNext');
        const pageNum = document.getElementById('shPageNum');
        const pageStart = document.getElementById('shPageStart');
        const pageEnd = document.getElementById('shPageEnd');
        const pageTotal = document.getElementById('shPageTotal');
        function renderHistPage() {
          const start = (curPage - 1) * PER_PAGE;
          const end = Math.min(start + PER_PAGE, total);
          historyBody.innerHTML = allRows.slice(start, end).join('');
          if (pageStart) pageStart.textContent = start + 1;
          if (pageEnd) pageEnd.textContent = end;
          if (pageTotal) pageTotal.textContent = total;
          if (pageNum) pageNum.textContent = curPage + ' / ' + pages;
          if (prevBtn) prevBtn.disabled = curPage <= 1;
          if (nextBtn) nextBtn.disabled = curPage >= pages;
        }
        if (pagerEl) {
          pagerEl.classList.toggle('d-none', pages <= 1);
          if (prevBtn) prevBtn.onclick = () => { if (curPage > 1) { curPage--; renderHistPage(); } };
          if (nextBtn) nextBtn.onclick = () => { if (curPage < pages) { curPage++; renderHistPage(); } };
        }
        renderHistPage();
      }
    }

    if (data.running) {
      startScrapeAutoRefresh();
    } else {
      stopScrapeAutoRefresh();
    }
  }

  async function fetchJsonWithRetry(url, retries = 2, delayMs = 350) {
    let lastNetworkErr = null;

    for (let attempt = 0; attempt <= retries; attempt++) {
      let res;
      try {
        res = await fetch(url);           /* only throws on actual network failure */
      } catch (networkErr) {
        /* Real network failure (offline, DNS, CORS) — worth retrying */
        lastNetworkErr = networkErr;
        if (attempt < retries) await new Promise((r) => setTimeout(r, delayMs * (attempt + 1)));
        continue;
      }

      /* We got an HTTP response — parse it regardless of status */
      let data = null;
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('application/json') || ct.includes('text/json')) {
        try { data = await res.json(); } catch { /* JSON parse failed despite content-type */ }
      } else {
        /* Server sent non-JSON (HTML error page, plain text, etc.) */
        let body = '';
        try { body = await res.text(); } catch { /* ignore */ }
        /* Synthesise a data object with enough info for preciseError to surface */
        const snippet = body.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 300);
        data = {
          error: `HTTP ${res.status} ${res.statusText}${snippet ? ': ' + snippet : ''}`,
          _raw_status: res.status,
          _raw_body: snippet,
        };
      }

      return { res, data };    /* always return — never retry HTTP errors */
    }

    /* Only reach here on repeated genuine network failures */
    throw lastNetworkErr || new Error('Network request failed after retries');
  }

  function setUpdated(elId, failed = false) {

  function preciseError(res, data, fallback, err) {
    const status = Number(res?.status || 0);
    const apiMsg = (data && (data.error || data.message || data.detail)) ? String(data.error || data.message || data.detail) : '';
    const errMsg = err ? String(err) : '';
    const reason = String(data?.reason_code || '');

    let msg = apiMsg || errMsg || fallback;

    if (status === 403 && msg.toLowerCase().includes('csrf')) {
      msg = T.csrfBlocked;
    } else if (status === 400 && !apiMsg) {
      msg = T.invalidParams(fallback);
    } else if (status === 404) {
      msg = T.endpointNotFound(fallback);
    } else if (status >= 500 && !apiMsg) {
      msg = T.serverError(status, fallback);
    }

    const remediationByReason = {
      PROGRAM_SCOPE_MISSING_PROGRAM: T.remPickProgram,
      PROGRAM_SCOPE_OUTSIDE_ALLOWED: T.remChooseProgram,
      STUDENT_SCOPE_ADVISOR_MISMATCH: T.remAdvisorMismatch,
      STUDENT_SCOPE_DEPARTMENT_MISMATCH: T.remDeptMismatch,
      STUDENT_SCOPE_NOT_FOUND: T.remStudentNotFound,
    };
    const allowed = Array.isArray(data?.allowed_programs) ? data.allowed_programs : [];
    if (reason && remediationByReason[reason]) {
      msg = `${msg} ${T.remediation}: ${remediationByReason[reason]}`;
      if (allowed.length) msg += ` ${T.allowed}: ${allowed.join(', ')}`;
    } else if (status === 403) {
      msg = `${msg} ${T.remediation}: ${T.verifyScope}`;
    }

    return status ? `${msg} [HTTP ${status}${reason ? ` | ${reason}` : ''}]` : msg;
  }

  function exportMissingFields(href) {
    if (!href || href.endsWith('#')) return [T.requiredFilters];
    try {
      const u = new URL(href, window.location.origin);
      const p = u.searchParams;
      if (u.pathname.includes('/export/aggregate.csv')) {
        const out = [];
        if (!p.get('year')) out.push('year');
        if (!p.get('semester')) out.push('semester');
        return out;
      }
      if (u.pathname.includes('/export/student.csv') || u.pathname.includes('/export/student-plan.csv')) {
        return !p.get('student_id') ? ['student_id'] : [];
      }
      if (u.pathname.includes('/export/recommendation-debug.csv')) {
        const out = [];
        if (!p.get('year')) out.push('year');
        if (!p.get('semester')) out.push('semester');
        return out;
      }
      if (u.pathname.includes('/export/course-eligibility.csv')) {
        return !p.get('course_code') ? ['course_code'] : [];
      }
      if (u.pathname.includes('/export/students-by-advisor.csv')) {
        return !p.get('advisor_id') ? ['advisor_id'] : [];
      }
      if (u.pathname.includes('/export/missing-high-priority.xlsx')) {
        const out = [];
        if (!p.get('year')) out.push('year');
        if (!p.get('semester')) out.push('semester');
        return out;
      }
      return [];
    } catch {
      return [T.requiredFilters];
    }
  }

  /* ── Client-side table pagination ── */
  function paginateTable(tableId, pagerId, perPage) {
    perPage = perPage || 25;
    const table = document.getElementById(tableId);
    const pager = document.getElementById(pagerId);
    if (!table || !pager) return;

    const tbody = table.querySelector('tbody');
    if (!tbody) return;

    const allRows = Array.from(tbody.querySelectorAll('tr'));
    /* If the table shows an empty-state / empty-note placeholder, or has 0 real data rows, hide pager */
    const hasEmpty = allRows.length <= 1 && (
      tbody.querySelector('.empty-state, .empty-note, .ap-empty') ||
      allRows.length === 0
    );
    if (hasEmpty) { pager.innerHTML = ''; return; }

    const totalRows = allRows.length;
    /* Hide pager entirely when total rows fit within default page size */
    if (totalRows <= perPage) { pager.innerHTML = ''; return; }

    let currentPage = 1;
    let rowsPerPage = perPage;

    function render() {
      const total = totalRows;
      const totalPages = rowsPerPage === 0 ? 1 : Math.ceil(total / rowsPerPage);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = rowsPerPage === 0 ? 0 : (currentPage - 1) * rowsPerPage;
      const end = rowsPerPage === 0 ? total : Math.min(start + rowsPerPage, total);

      allRows.forEach((row, i) => {
        row.style.display = (i >= start && i < end) ? '' : 'none';
      });

      const showStart = total === 0 ? 0 : start + 1;
      const showEnd = end;
      const isAr = typeof IS_AR !== 'undefined' && IS_AR;
      const prevLabel = isAr ? 'السابق' : 'Prev';
      const nextLabel = isAr ? 'التالي' : 'Next';
      const pageLabel = isAr ? '\u0635\u0641\u062D\u0629' : 'Page';
      const ofLabel = isAr ? '\u0645\u0646' : 'of';
      const showingLabel = isAr ? '\u0639\u0631\u0636' : 'Showing';
      const allLabel = isAr ? '\u0627\u0644\u0643\u0644' : 'All';

      pager.innerHTML =
        '<span class="tbl-pager-info">' + showingLabel + ' ' + showStart + '\u2013' + showEnd + ' ' + ofLabel + ' ' + total + '</span>' +
        '<span class="tbl-pager-nav" style="display:flex;align-items:center;gap:8px;">' +
          '<button type="button" class="tbl-pg-prev" ' + (currentPage <= 1 ? 'disabled' : '') + ' aria-label="' + prevLabel + '">\u2039 ' + prevLabel + '</button>' +
          '<span class="tbl-pg-num">' + pageLabel + ' ' + currentPage + ' ' + ofLabel + ' ' + totalPages + '</span>' +
          '<button type="button" class="tbl-pg-next" ' + (currentPage >= totalPages ? 'disabled' : '') + ' aria-label="' + nextLabel + '">' + nextLabel + ' \u203A</button>' +
        '</span>' +
        '<span class="tbl-pager-size" style="display:flex;align-items:center;gap:4px;">' +
          '<label for="' + pagerId + 'Sel" style="margin:0;font-weight:400">' + (isAr ? '\u0635\u0641\u0648\u0641' : 'Rows') + ':</label>' +
          '<select id="' + pagerId + 'Sel" aria-label="Rows per page">' +
            '<option value="10"' + (rowsPerPage === 10 ? ' selected' : '') + '>10</option>' +
            '<option value="25"' + (rowsPerPage === 25 ? ' selected' : '') + '>25</option>' +
            '<option value="50"' + (rowsPerPage === 50 ? ' selected' : '') + '>50</option>' +
            '<option value="0"' + (rowsPerPage === 0 ? ' selected' : '') + '>' + allLabel + '</option>' +
          '</select>' +
        '</span>';

      const prevBtn = pager.querySelector('.tbl-pg-prev');
      const nextBtn = pager.querySelector('.tbl-pg-next');
      const sel = pager.querySelector('select');

      if (prevBtn) prevBtn.onclick = function() { if (currentPage > 1) { currentPage--; render(); } };
      if (nextBtn) nextBtn.onclick = function() { if (currentPage < totalPages) { currentPage++; render(); } };
      if (sel) sel.onchange = function() { rowsPerPage = parseInt(sel.value, 10); currentPage = 1; render(); };
    }

    render();
  }

  /* Wire up sortable tables (provided by shared-ux.js) */
  wireSortableTable('batchTable');
  wireSortableTable('preTable');
  wireSortableTable('planTable');
  wireSortableTable('planPrereqTable');
  wireSortableTable('dbgTable');
  wireSortableTable('elTable');
  wireSortableTable('exportsTable');
  wireSortableTable('hpTable');

  const hashTargetRaw = (window.location.hash || '').replace('#', '');
  /* Redirect hash routes for panels that moved to standalone pages */
  const standaloneRedirects = { advisorportfolio: '/advisor-portfolio/', advisors: '/advisor-portfolio/', usermgmt: '/user-management/', dbadmin: '/db-admin/' };
  if (standaloneRedirects[hashTargetRaw]) { window.location.href = standaloneRedirects[hashTargetRaw]; }
  const hashTarget = hashTargetRaw;
  // If the form was submitted (student_id in query string), force student panel
  const urlParams = new URLSearchParams(window.location.search);
  const inferredPanel = urlParams.has('student_id') ? 'student' : null;
  const startPanel = hashTarget || inferredPanel;
  if (startPanel && document.getElementById(startPanel)) {
    activatePanel(startPanel);
  } else {
    // Default to overview panel when no hash is present
    activatePanel('overview');
  }

  window.addEventListener('hashchange', () => {
    const raw = (window.location.hash || '').replace('#', '');
    if (standaloneRedirects[raw]) { window.location.href = standaloneRedirects[raw]; return; }
    if (raw && document.getElementById(raw)) {
      activatePanel(raw);
    }
  });

  refreshAdvisorsDropdown();
  refreshScrapeStatus();
  /* -- User Management JS → moved to standalone page at /user-management/ -- */

  /* ═══════════════════════════════════════════════════════════════
     ENHANCEMENT JS — Overview, Student Context, Issues 14/15/20/28
     ═══════════════════════════════════════════════════════════════ */

  /* ── Overview panel: greeting + date ── */
  (() => {
    const greetEl = q('ovGreeting');
    const dateEl = q('ovDate');
    if (!greetEl || !dateEl) return;

    const now = new Date();
    const hour = now.getHours();
    let greeting;
    if (IS_AR) {
      greeting = hour < 12 ? 'صباح الخير' : hour < 17 ? 'مساء الخير' : 'مساء الخير';
    } else {
      greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    }
    const username = greetEl.textContent.split(',').pop()?.trim() || '';
    greetEl.textContent = greeting + ', ' + username;

    const opts = IS_AR
      ? { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }
      : { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    dateEl.textContent = now.toLocaleDateString(IS_AR ? 'ar-SA' : 'en-US', opts);
  })();

  /* ── Overview panel: activity feed logger ── */
  const ovActivityLog = [];
  function logOverviewActivity(msg) {
    const ts = new Date().toLocaleTimeString(IS_AR ? 'ar-SA' : 'en-US', { hour: '2-digit', minute: '2-digit' });
    ovActivityLog.unshift({ ts, msg });
    if (ovActivityLog.length > 8) ovActivityLog.length = 8;
    const feed = q('ovActivityFeed');
    if (!feed) return;
    feed.innerHTML = ovActivityLog.map(a =>
      `<div class="ov-activity-item"><span class="ov-activity-ts">${a.ts}</span><span>${a.msg}</span></div>`
    ).join('');
  }

  /* Hook into toast to auto-log activities */
  const _origNotifySuccess = notify.success;
  const _origNotifyError = notify.error;
  notify.success = function(title, body) {
    _origNotifySuccess.call(notify, title, body);
    logOverviewActivity(title + (body ? ': ' + body : ''));
  };
  notify.error = function(title, body) {
    _origNotifyError.call(notify, title, body);
    logOverviewActivity(title + (body ? ': ' + body : ''));
  };

  /* ── Overview KPIs: poll from loaded data ── */
  function refreshOverviewKpis() {
    /* Students assigned: from batch metric if loaded */
    const batchStudents = q('batchMetricStudents');
    if (batchStudents && batchStudents.textContent !== '0') {
      const el = q('ovKpiStudents');
      if (el) el.textContent = batchStudents.textContent;
    }
    /* Pending: from batch top count */
    const batchTopCount = q('batchMetricTopCount');
    if (batchTopCount && batchTopCount.textContent !== '0') {
      const el = q('ovKpiPending');
      if (el) el.textContent = batchTopCount.textContent;
    }
    /* Overdue: from scrape status */
    const scrapeStatus = q('scrapeMetricStatus');
    if (scrapeStatus) {
      const isRunning = scrapeStatus.innerHTML.includes('status-running');
      const el = q('ovKpiOverdue');
      if (el) el.textContent = isRunning ? '1' : '0';
    }
    /* High priority: from HP table */
    const hpTbody = document.querySelector('#hpTable tbody');
    const hpEmpty = hpTbody?.querySelector('.empty-note, .empty-state');
    const hpCount = hpTbody && !hpEmpty ? hpTbody.querySelectorAll('tr').length : 0;
    const hpEl = q('ovKpiHighPri');
    if (hpEl && hpCount > 0) hpEl.textContent = String(hpCount);
  }
  setInterval(refreshOverviewKpis, 4000);

  /* ── Student Context Sidebar: populate when student plan loads ── */
  (() => {
    const sidebar = q('studentCtxSidebar');
    if (!sidebar) return;

    function updateStudentCtx() {
      if (!studentPlanData) {
        sidebar.classList.add('hidden');
        return;
      }
      sidebar.classList.remove('hidden');

      const d = studentPlanData;
      const s = d.summary || {};
      q('studentCtxId').textContent = d.student_id || '--';
      q('studentCtxProgram').textContent = d.program || '--';
      q('studentCtxGpa').textContent = d.gpa != null ? String(Number(d.gpa).toFixed(2)) : '--';

      const passed = Number(s.passed || 0);
      const studying = Number(s.studying || 0);
      const canReg = Number(s.not_taken_can_register || 0);
      const locked = Number(s.not_taken_locked || 0);
      const total = passed + studying + canReg + locked;

      /* Credits: derive from courses if available */
      const allCourses = (d.terms || []).flatMap(t => t.courses || []);
      const earnedCredits = allCourses.filter(c => c.status === 'passed').reduce((a, c) => a + (Number(c.credit_hours) || 0), 0);
      const totalCredits = allCourses.reduce((a, c) => a + (Number(c.credit_hours) || 0), 0);

      q('studentCtxEarned').textContent = String(earnedCredits) + ' CH';
      q('studentCtxRemaining').textContent = String(totalCredits - earnedCredits) + ' CH';
      q('studentCtxPrereqMet').textContent = String(passed);
      q('studentCtxPrereqPending').textContent = String(locked);

      const profileLink = q('studentCtxFullProfile');
      if (profileLink && d.student_id) {
        profileLink.href = `/planner/?student=${d.student_id}`;
        profileLink.classList.remove('d-none');
      }
    }

    /* Watch the student plan meta for changes to know when data loaded */
    const meta = q('studentPlanMeta');
    if (meta) {
      new MutationObserver(updateStudentCtx).observe(meta, { childList: true, characterData: true, subtree: true });
    }
  })();

  /* Issue #14 double-click wrapper removed — dlg.confirm() already provides
     a proper confirmation dialog before starting the scrape. */

  /* ── Issue #15: Export button loading state ── */
  (() => {
    const exportIds = [
      'exStudentCsv', 'exAggregateCsv', 'exPlanCsv', 'exDebugCsv',
      'exEligibilityCsv', 'exAdvisorCsv', 'exHighPriorityXlsx',
      'batchCsv', 'dbgCsv', 'elCsv', 'hpXlsx', 'spCsvExport'
    ];
    exportIds.forEach(id => {
      const el = q(id);
      if (!el) return;
      el.addEventListener('click', () => {
        /* Only add loading state if the link actually has a valid href */
        const href = el.getAttribute('href') || '';
        if (!href || href === '#') return;
        el.classList.add('ux-loading');
        el.style.pointerEvents = 'none';
        setTimeout(() => {
          el.classList.remove('ux-loading');
          el.style.pointerEvents = '';
        }, 3000);
      });
    });
  })();

  /* ── Issue #20: Batch progress indicator ── */
  (() => {
    const origRunBatch = q('runBatch');
    if (!origRunBatch) return;
    const progressWrap = q('batchProgressWrap');
    const progressBar = q('batchProgressBar');
    if (!progressWrap || !progressBar) return;

    let batchProgressInterval = null;

    const origOnClick = origRunBatch.onclick;
    origRunBatch.onclick = async (e) => {
      /* Show progress bar */
      progressWrap.classList.remove('d-none');
      progressBar.style.width = '0%';
      let pct = 0;
      batchProgressInterval = setInterval(() => {
        pct += Math.random() * 12 + 3;
        if (pct > 90) pct = 90;
        progressBar.style.width = pct + '%';
      }, 300);

      if (origOnClick) await origOnClick.call(origRunBatch, e);

      /* Complete progress */
      clearInterval(batchProgressInterval);
      progressBar.style.width = '100%';
      setTimeout(() => {
        progressWrap.classList.add('d-none');
        progressBar.style.width = '0%';
      }, 600);
    };
  })();

  /* ── Issue #28: Scrape terminal expand/collapse toggle ── */
  (() => {
    const toggleBtn = q('scrapeTermToggle');
    const termBody = q('scrapeOut');
    const label = q('scrapeTermToggleLabel');
    if (!toggleBtn || !termBody) return;

    toggleBtn.addEventListener('click', () => {
      const isExpanded = termBody.classList.toggle('expanded');
      if (label) label.textContent = IS_AR
        ? (isExpanded ? 'تصغير' : 'توسيع')
        : (isExpanded ? 'Collapse' : 'Expand');
    });
  })();
</script>
