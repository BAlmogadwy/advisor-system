    <div id="eligibility" class="panel" role="region">

        <div class="fb-search fb-w-110"><input id="elSection" placeholder="{% if LANGUAGE_CODE == 'ar' %}الشعبة{% else %}Section{% endif %}" aria-label="{% if LANGUAGE_CODE == 'ar' %}الشعبة{% else %}Section{% endif %}"></div>
        <div class="fb-search fb-w-120"><input id="elProgram" placeholder="{% if LANGUAGE_CODE == 'ar' %}البرنامج{% else %}Program{% endif %}" aria-label="{% if LANGUAGE_CODE == 'ar' %}البرنامج{% else %}Program{% endif %}"></div>

        </button>
      </div>
      <div class="filter-bar filter-bar-sm mb-14">

        <button id="elLoadPreset" type="button" class="fb-dd"><span class="i i-sm" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></span>Load preset</button>
        <div class="fb-spacer"></div>
        <button id="elCopyIds" type="button" class="fb-dd" title="{% if LANGUAGE_CODE == 'ar' %}نسخ أرقام الطلاب المؤهلين للصقها في صفحة التوافر الجماعي{% else %}Copy eligible IDs to paste into Group Availability{% endif %}"><span class="i i-sm" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>{% if LANGUAGE_CODE == 'ar' %}نسخ الأرقام{% else %}Copy IDs{% endif %}</button>
        <a id="elCsv" class="fb-dd" href="#"><span class="i i-sm" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>CSV</a>
      </div>
      <div id="elMeta" class="meta-banner meta-info meta-mono mb-14">No eligibility report loaded.</div>

          <div class="mc-val mc-val-sm" id="elModeBadge">relaxed</div>
        </div></div>
        <div class="flex-card"><div class="mc mc-sky">
          <div class="mc-head"><div class="mc-icon"><span class="i" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></span></div><div class="mc-lbl">Course</div></div>

        </div></div>
      </div>
      <div id="elUpdated" class="ts-updated mb-10">Last update: —</div>

          </table>
        </div>
        <nav class="tbl-pager" id="elPager" aria-label="Eligibility table pagination"></nav>
      </div>
