    const PLACEHOLDERS = {

      "e.g. CS323": "مثال: CS323",

      "AI/CS": "AI/CS",

      "default: data/students_list.csv": "افتراضي: data/students_list.csv"
    };

    function translateNodeText(el) {
      if (!el) return;
      // Avoid translating inputs/selects/textarea values directly here
      const tag = (el.tagName || "").toLowerCase();
      if (["script", "style", "code", "pre"].includes(tag)) return;
      // Only translate leaf nodes (no nested element children)
      if (el.children && el.children.length) return;

      const raw = (el.textContent || "").trim();
      if (!raw) return;

      // Handle common prefixes like "Role: X" or "Last update: never"
      for (const [en, ar] of Object.entries(MAP)) {
        if (raw === en) { el.textContent = ar; return; }
        // Prefix case: "Role: {{ role }}" etc.
        if (raw.startsWith(en) && raw.length > en.length) {
          el.textContent = ar + raw.slice(en.length);
          return;
        }
      }
    }

    function translateAttributes(root) {
      root.querySelectorAll("[placeholder]").forEach(el => {
        const p = el.getAttribute("placeholder");
        if (p && PLACEHOLDERS[p]) el.setAttribute("placeholder", PLACEHOLDERS[p]);
      });
      root.querySelectorAll("a[title],button[title],input[title],select[title],textarea[title]").forEach(el => {
        const t = el.getAttribute("title");
        if (t && MAP[t]) el.setAttribute("title", MAP[t]);
      });
    }

    function translateOptions(root) {
      root.querySelectorAll("option").forEach(opt => {
        const raw = (opt.textContent || "").trim();
        if (MAP[raw]) opt.textContent = MAP[raw];
      });
    }

    function walkAndTranslate(root) {
      // Translate common UI text nodes
      const candidates = root.querySelectorAll("h1,h2,h3,h4,h5,h6,div,span,p,a,button,label,th,td,summary,li,small,strong,badge,pre");
      candidates.forEach(translateNodeText);
      translateOptions(root);
      translateAttributes(root);
    }

    // Initial pass
    walkAndTranslate(document);

    // Translate module title when navigation changes (JS in page may update it)
    const cm = document.getElementById("currentModule");
    if (cm) {
      const obs = new MutationObserver(() => translateNodeText(cm));
      obs.observe(cm, { childList: true, characterData: true, subtree: true });
    }

    // If page renders more content later, re-translate once after load
    window.addEventListener("load", () => {
      walkAndTranslate(document);
    });
  })();

  /* ════════════════════════════════════════════════════════════════
     UX ADDITIONS — purely additive, zero existing logic changed
     ════════════════════════════════════════════════════════════════ */

  /* ── REC 5: Update context chip when student plan loads ── */
  (() => {
    const origLoadPlan = q('loadStudentPlan');
    if (!origLoadPlan) return;
    const chip = q('phContextChip');
    if (!chip) return;
    const observer = new MutationObserver(() => {
      const meta = q('studentPlanMeta');
      if (meta && meta.textContent && meta.textContent.includes('Student')) {
        chip.textContent = meta.textContent.split('•')[0].trim();
        chip.classList.remove('d-none');
      }
    });
    const meta = q('studentPlanMeta');
    if (meta) observer.observe(meta, { childList: true, characterData: true, subtree: true });
  })();

  /* ── REC 6: ⌘K / Ctrl+K command palette (enhanced with keyboard nav) ── */
  (() => {
    const palette = q('cmdPalette');
    const input   = q('cmdInput');
    const results = q('cmdResults');
    if (!palette || !input || !results) return;

    /* Recent students — stored in localStorage */
    const RECENT_KEY = 'cmd_recent_students';
    function getRecentStudents() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]').slice(0, 5); } catch { return []; }
    }
    function addRecentStudent(sid) {
      const list = getRecentStudents().filter(s => s !== String(sid));
      list.unshift(String(sid));
      if (list.length > 5) list.length = 5;
      try { localStorage.setItem(RECENT_KEY, JSON.stringify(list)); } catch {}
    }

    let kbdIndex = -1;

    function updateKbdHighlight() {
      const items = results.querySelectorAll('.cmd-item');
      items.forEach((el, i) => el.classList.toggle('kbd-active', i === kbdIndex));
      if (kbdIndex >= 0 && items[kbdIndex]) items[kbdIndex].scrollIntoView({ block: 'nearest' });
    }

    function activateItem(item) {
      if (!item) return;
      const action = item.dataset.action;
      if (action === 'open-student') {
        const sid = item.dataset.sid;
        addRecentStudent(sid);
        q('studentIdInput').value = sid;
        closePalette();
        activatePanel('student');
        history.pushState(null, '', '#student');
        window.scrollTo({ top: 0, behavior: 'instant' });
        q('loadStudentPlan')?.click();
        toast(T.openingPlan(sid), true);
      }
    }

    function showRecentStudents() {
      const recent = getRecentStudents();
      if (!recent.length) {
        results.innerHTML = `<div class="cmd-hint">${T.paletteHint}</div>`;
        return;
      }
      const recentLabel = IS_AR ? 'الطلاب الأخيرون' : 'Recent Students';
      let html = `<div class="cmd-section-label">${recentLabel}</div>`;
      html += recent.map(sid => `
        <div class="cmd-item" data-action="open-student" data-sid="${sid}">
          <span class="cmd-item-id">${sid}</span>
          <span class="cmd-item-name">${T.navToStudentPlan}</span>
          <span class="cmd-item-badge">${T.openPlan}</span>
        </div>`).join('');
      results.innerHTML = html;
      bindItemClicks();
    }

    function bindItemClicks() {
      results.querySelectorAll('.cmd-item').forEach(item => {
        item.addEventListener('click', () => activateItem(item));
      });
    }

    const openPalette = () => {
      palette.classList.remove('d-none');
      input.value = '';
      kbdIndex = -1;
      showRecentStudents();
      requestAnimationFrame(() => input.focus());
    };

    const closePalette = () => { palette.classList.add('d-none'); kbdIndex = -1; };

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        palette.classList.contains('d-none') ? openPalette() : closePalette();
      }
      if (e.key === 'Escape' && !palette.classList.contains('d-none')) {
        e.preventDefault();
        e.stopPropagation();
        closePalette();
      }
    });

    palette.addEventListener('click', (e) => { if (e.target === palette) closePalette(); });

    /* Keyboard navigation in results */
    input.addEventListener('keydown', (e) => {
      const items = results.querySelectorAll('.cmd-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        kbdIndex = Math.min(kbdIndex + 1, items.length - 1);
        updateKbdHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        kbdIndex = Math.max(kbdIndex - 1, -1);
        updateKbdHighlight();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (kbdIndex >= 0 && items[kbdIndex]) {
          activateItem(items[kbdIndex]);
        } else if (items.length === 1) {
          activateItem(items[0]);
        }
      }
    });

    input.addEventListener('input', () => {
      const val = input.value.trim();
      kbdIndex = -1;
      if (!val) {
        showRecentStudents();
        return;
      }

      // Always offer direct navigation by ID if it looks numeric
      const isNum = /^\d+$/.test(val);
      let html = '';

      if (isNum) {
        html += `<div class="cmd-section-label">${T.directNav}</div>`;
        html += `<div class="cmd-item" data-action="open-student" data-sid="${val}">
          <span class="cmd-item-id">${val}</span>
          <span class="cmd-item-name">${T.navToStudentPlan}</span>
          <span class="cmd-item-badge">${T.openPlan}</span>
        </div>`;
      }

      if (!html) {
        html = `<div class="cmd-hint">${T.noMatchesFound}</div>`;
      }

      results.innerHTML = html;
      bindItemClicks();
    });
  })();


  /* ── REC 8: Advisor admin step activation ── */
  (() => {
    const step1 = q('admStep1'), step2 = q('admStep2'), step3 = q('admStep3');
    if (!step1) return;

    const markDone = (stepEl) => {
      stepEl.classList.remove('adm-step-inactive');
      const circle = stepEl.querySelector('.adm-step-circle');
      if (circle) circle.textContent = '✓';
    };

    // Mark step 1 done when advisor is saved
    const saveBtn = q('advSave');
    if (saveBtn) {
      saveBtn.addEventListener('click', () => {
        setTimeout(() => {
          // only mark done if no field errors visible
          const hasErr = document.querySelector('.field-error:not([style*="display: none"]):not([style*="display:none"])');
          if (!hasErr) {
            markDone(step1);
            step2?.classList.remove('adm-step-inactive');
          }
        }, 600);
      });
    }

    // Mark step 2 done when CSV applied
    const csvBtn = q('advAssignCsvBtn');
    if (csvBtn) {
      csvBtn.addEventListener('click', () => {
        setTimeout(() => { markDone(step2); step3?.classList.remove('adm-step-inactive'); }, 400);
      });
    }

    // Mark step 3 done when single assign done
    const oneBtn = q('advAssignOneBtn');
    if (oneBtn) {
      oneBtn.addEventListener('click', () => {
        setTimeout(() => markDone(step3), 400);
      });
    }
  })();

  /* ── REC 3: Sidebar badges — populated from cached data ── */
  (() => {
    function updateSidebarBadges() {
      // High priority: from last loaded HP report
      const hpTbody = document.querySelector('#hpTable tbody');
      const hpPlaceholder = hpTbody?.querySelector('td[colspan], .empty-note, .empty-state');
      const hpRows = hpTbody && !hpPlaceholder ? hpTbody.querySelectorAll('tr').length : 0;
      const sbHp = document.querySelector('.sb-badge-hp');
      if (sbHp) {
        if (hpRows > 0) {
          sbHp.textContent = hpRows;
          sbHp.className = 'nav-badge sidebar-badge warning';
          sbHp.style.display = '';
        } else {
          sbHp.textContent = '';
          sbHp.style.display = 'none';
        }
      }

      // Export: show "Ready" if any export link is set
      const sbExport = document.querySelector('.sb-badge-export');
      const exportReady = Boolean(q('exStudentCsv')?.href?.includes('?'));
      if (sbExport) {
        sbExport.textContent = exportReady ? 'Ready' : '';
        sbExport.className = 'nav-badge sidebar-badge ready';
        sbExport.style.display = exportReady ? '' : 'none';
      }
    }

    window.updateSidebarBadges = updateSidebarBadges;
    document.addEventListener('dashboard:badges:update', updateSidebarBadges);
    updateSidebarBadges();
  })();

</script>
