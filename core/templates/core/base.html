{# core/base.html — shared base for all pages #}
{% load i18n static %}{% get_current_language as LANGUAGE_CODE %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{% trans "Advisor Dashboard" %}{% endblock %}</title>
  <link rel="icon" href="data:,">
  <link href="{% static 'css/global.css' %}" rel="stylesheet">
  <link href="{% static 'css/bootstrap-compat.css' %}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="color-mesh"></div>
<div class="ambience">
  <div class="amb amb-1"></div>
  <div class="amb amb-2"></div>
  <div class="amb amb-3"></div>
  <div class="amb amb-4"></div>
  <div class="amb amb-5"></div>
  <div class="amb amb-6"></div>
</div>
{% block body %}{% endblock %}
{% block extra_js %}{% endblock %}
</body>
</html>
